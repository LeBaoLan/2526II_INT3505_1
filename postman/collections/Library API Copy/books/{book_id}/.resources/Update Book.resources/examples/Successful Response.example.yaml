$kind: http-example
request:
  url: "{{baseUrl}}/books/:book_id"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    book_id: string
  body:
    type: json
    content: |-
      {
        "title": "string",
        "isbn": "string",
        "published_year": 9656
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: ""
order: 1000
