$kind: http-example
request:
  url: "{{baseUrl}}/bench/cursor?cursor=string&limit=10"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: cursor
      value: string
      description: id cua ban ghi cuoi trang truoc
    - key: limit
      value: "10"
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "detail": [
          {
            "loc": [
              "string",
              1879
            ],
            "msg": "string",
            "type": "string"
          },
          {
            "loc": [
              4909,
              "string"
            ],
            "msg": "string",
            "type": "string"
          }
        ]
      }
order: 2000
